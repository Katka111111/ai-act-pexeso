<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Act Pexeso – plátno lektorky</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app board-app">

  <header class="top-bar">
    <div class="brand">
      <div class="brand-badge">AI</div>
      <div>
        <h1>AI Act Pexeso</h1>
        <small>Plátno lektorky – Soutěž</small>
      </div>
    </div>
  </header>

  <section id="screen-monitor-soutez" class="screen active">
    <div class="card-panel" style="max-width:760px;">
      <h2 style="margin-bottom:6px;">Správa soutěží</h2>
      <p style="color:var(--text-muted);font-size:14px;margin-top:0;">
        Zobrazuje se: <strong id="current-session-label"></strong>
      </p>

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        <input type="text" id="session-label-input" placeholder="označení, např. odpoledne (nepovinné)" style="flex:1;min-width:180px;margin:0;">
        <button class="btn-primary" id="btn-session-create" style="min-width:auto;">Vytvořit / přepnout</button>
      </div>

      <p style="font-size:13px;color:var(--text-muted);margin:0 0 6px;">Historie dnešních soutěží (klikni pro zobrazení, × pro smazání):</p>
      <div id="session-tabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;"></div>
      <p class="local-mode-note" id="board-local-note" style="display:none;"></p>

      <div style="margin-top:20px;">
        <p style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">
          Odkaz/QR pro hráče TÉTO soutěže:
        </p>
        <p style="word-break:break-all;font-weight:600;color:var(--ozp-purple);" id="player-link-text"></p>
        <img id="player-qr" alt="QR kód pro hráče" class="qr-image" style="width:180px;height:180px;">
      </div>
    </div>

    <div class="session-info" style="margin-top:26px;">Živý žebříček aktuálního kola</div>
    <div class="round-tabs">
      <button class="round-tab-btn active" data-round="1">Kolo 1</button>
      <button class="round-tab-btn" data-round="2">Kolo 2</button>
      <button class="round-tab-btn" data-round="3">Kolo 3</button>
    </div>
    <div class="leaderboard-list" id="leaderboard-list">
      <p class="empty-note">Čekáme na výsledky…</p>
    </div>
    <div style="text-align:center;margin-top:26px;">
      <button class="btn-primary" id="btn-show-final" style="max-width:340px;margin:0 auto;">Zobrazit celkové výsledky (po 3. kole)</button>
    </div>
  </section>

  <!-- Finální vyhlášení -->
  <section id="screen-final" class="screen">
    <div class="winner-banner" id="winner-banner">
      <h2>Vítěz dne</h2>
      <div class="winner-name" id="winner-name">–</div>
    </div>
    <div class="leaderboard-list" id="final-list"></div>
    <div style="text-align:center;margin-top:20px;">
      <button class="btn-secondary" id="btn-back-to-monitor">Zpět na žebříček podle kol</button>
    </div>
  </section>

</div>

<canvas id="confetti-canvas-board"></canvas>

<script src="js/config.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/pexeso-core.js"></script>
<script>
  function $(id) { return document.getElementById(id); }

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
    $(id).classList.add("active");
  }

  const dateStr = getDateStr();
  let currentSessionId = getSessionId();
  let currentViewRound = 1;
  let pollTimer = null;

  function labelFromSessionId(id) {
    return id === dateStr ? "" : id.slice(dateStr.length + 1);
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function updatePlayerLinkAndQr() {
    const label = labelFromSessionId(currentSessionId);
    const search = label ? `?s=${encodeURIComponent(label)}` : "";
    const playerUrl = new URL("index.html" + search, window.location.href).toString();
    $("player-link-text").textContent = playerUrl;
    $("player-qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(playerUrl)}`;
  }

  async function refreshTabs() {
    const ids = await LB.listTodaySessions(dateStr);
    if (!ids.includes(currentSessionId)) ids.push(currentSessionId);
    ids.sort();
    $("session-tabs").innerHTML = ids
      .map((id) => {
        const label = labelFromSessionId(id) || "výchozí";
        const active = id === currentSessionId;
        return `<span style="display:inline-flex;align-items:stretch;border-radius:8px;overflow:hidden;">
          <button data-id="${escapeHtml(id)}" class="round-tab-btn${active ? " active" : ""}" style="border-radius:0;">${escapeHtml(label)}</button>
          <button data-delete-id="${escapeHtml(id)}" title="Smazat tuto soutěž" style="all:unset;cursor:pointer;color:#a33;background:#fdeeee;font-weight:800;padding:0 12px;display:flex;align-items:center;">×</button>
        </span>`;
      })
      .join("");
    document.querySelectorAll("#session-tabs button[data-id]").forEach((btn) => {
      btn.addEventListener("click", () => switchToSession(btn.dataset.id));
    });
    document.querySelectorAll("#session-tabs button[data-delete-id]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = btn.dataset.deleteId;
        const label = labelFromSessionId(id) || "výchozí";
        if (!confirm(`Opravdu smazat soutěž „${label}" a všechny její výsledky? Tohle nejde vzít zpět.`)) return;
        await LB.deleteSession(id);
        if (id === currentSessionId) {
          await switchToSession(dateStr);
        } else {
          await refreshTabs();
        }
      });
    });
  }

  function initRoundTabs() {
    document.querySelectorAll(".round-tab-btn[data-round]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".round-tab-btn[data-round]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentViewRound = parseInt(btn.dataset.round, 10);
        refreshRound();
      });
    });
  }

  async function refreshRound() {
    const list = $("leaderboard-list");
    try {
      const finishes = await LB.getFinishes(currentSessionId, currentViewRound);
      const rows = Object.keys(finishes)
        .map((key) => ({ jmeno: key, ...finishes[key] }))
        .sort((a, b) => (a.poradi_v_kole || 999) - (b.poradi_v_kole || 999));

      if (rows.length === 0) {
        list.innerHTML = '<p class="empty-note">Čekáme na výsledky…</p>';
        return;
      }
      list.innerHTML = rows
        .map(
          (r) => `
        <div class="lb-row">
          <div class="pos">${r.poradi_v_kole}</div>
          <div class="name">${escapeHtml(r.jmeno)}</div>
          <div class="meta">${r.trvani_s ?? "?"} s • ${r.pocet_chyb ?? 0} chyb</div>
        </div>`
        )
        .join("");
    } catch (e) {
      list.innerHTML = '<p class="empty-note">Čekáme na výsledky…</p>';
    }
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    refreshRound();
    pollTimer = setInterval(refreshRound, POLL_INTERVAL_MS);
  }

  async function showFinalStandings() {
    if (pollTimer) clearInterval(pollTimer);
    const list = $("final-list");
    list.innerHTML = '<p class="empty-note">Čekáme na výsledky…</p>';
    showScreen("screen-final");
    try {
      const { standings } = await LB.computeOverallStandings(currentSessionId);
      if (standings.length === 0) {
        $("winner-name").textContent = "–";
        list.innerHTML = '<p class="empty-note">Čekáme na výsledky…</p>';
        return;
      }
      $("winner-name").textContent = standings[0].jmeno;
      list.innerHTML = standings
        .map((s) => {
          const meta =
            s.stav === "dokoncil"
              ? `${s.body} bodů • ${s.casSoucet} s celkem`
              : "odešel(a) dřív, než dohrál(a) všechna kola";
          return `
          <div class="lb-row">
            <div class="pos">${s.poradi}</div>
            <div class="name">${escapeHtml(s.jmeno)}</div>
            <div class="meta">${meta}</div>
          </div>`;
        })
        .join("");
      startBoardConfetti();
    } catch (e) {
      list.innerHTML = '<p class="empty-note">Čekáme na výsledky…</p>';
    }
  }

  function startBoardConfetti() {
    startConfettiOn($("confetti-canvas-board"), 6000, true);
  }

  async function switchToSession(id) {
    currentSessionId = id;
    $("current-session-label").textContent = labelFromSessionId(id) || "(výchozí, jen datum)";
    $("session-label-input").value = labelFromSessionId(id);
    history.replaceState(null, "", labelFromSessionId(id) ? `?s=${encodeURIComponent(labelFromSessionId(id))}` : window.location.pathname);
    updatePlayerLinkAndQr();
    await LB.touchSession(id);
    await refreshTabs();
    showScreen("screen-monitor-soutez");
    startPolling();
  }

  $("btn-session-create").addEventListener("click", () => {
    const label = $("session-label-input").value.trim().toLowerCase().replace(/[^a-z0-9-]/g, "").slice(0, 30);
    const id = label ? `${dateStr}-${label}` : dateStr;
    switchToSession(id);
  });
  $("session-label-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") $("btn-session-create").click();
  });

  $("btn-show-final").addEventListener("click", showFinalStandings);
  $("btn-back-to-monitor").addEventListener("click", () => {
    showScreen("screen-monitor-soutez");
    startPolling();
  });

  window.addEventListener("resize", () => {
    const c1 = $("confetti-canvas-board");
    c1.width = window.innerWidth;
    c1.height = window.innerHeight;
  });

  async function init() {
    if (LB.isLocal()) {
      $("board-local-note").style.display = "block";
      $("board-local-note").textContent = LB.getLocalReason();
    }
    initRoundTabs();
    await switchToSession(currentSessionId);
  }

  init();
</script>
</body>
</html>
