<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Act – slovní mrak (plátno lektorky)</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app board-app">

  <header class="top-bar">
    <div class="brand">
      <div class="brand-badge">AI</div>
      <div>
        <h1>Slovní mrak</h1>
        <small>Plátno lektorky</small>
      </div>
    </div>
  </header>

  <section style="display:flex;flex-direction:column;align-items:center;width:100%;">
    <div class="card-panel" style="max-width:760px;">
      <h2 style="margin-bottom:6px;">Správa dnešních běhů</h2>
      <p style="color:var(--text-muted);font-size:14px;margin-top:0;">
        Zobrazuje se: <strong id="current-session-label"></strong><br>
        Otázka pro účastníky: <em id="current-session-question"></em>
      </p>

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
        <input type="text" id="session-label-input" placeholder="označení session, např. odpoledne (nepovinné)" style="flex:1;min-width:180px;margin:0;">
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        <input type="text" id="session-question-input" placeholder="Otázka pro účastníky, např. Co si představíte pod pojmem umělá inteligence?" style="flex:1;min-width:180px;margin:0;">
        <button class="btn-primary" id="btn-session-create" style="min-width:auto;">Vytvořit / přepnout</button>
      </div>

      <div id="session-tabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;"></div>
      <p class="local-mode-note" id="board-local-note" style="display:none;"></p>
    </div>
  </section>

  <section style="display:flex;flex-direction:column;align-items:center;width:100%;margin-top:16px;">
    <div class="card-panel" id="cloud-panel" style="max-width:1100px;width:100%;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <h2 id="cloud-question-title" style="margin:0 0 4px;text-align:left;"></h2>
        <button class="btn-secondary" id="btn-present" style="min-width:auto;white-space:nowrap;">⛶ Prezentovat na celou obrazovku</button>
      </div>

      <div id="cloud-content-row" style="display:flex;gap:20px;align-items:stretch;flex-wrap:wrap;">
        <div id="qr-side" style="flex:0 0 22%;min-width:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;border-right:1px solid #f0e6f2;padding-right:16px;">
          <p style="font-size:13px;color:var(--text-muted);margin:0;">Odkaz/QR pro účastníky:</p>
          <img id="player-qr" alt="QR kód pro účastníky" style="width:150px;height:150px;border-radius:10px;box-shadow:var(--shadow);">
          <p style="word-break:break-all;font-weight:600;color:var(--ozp-purple);font-size:12.5px;margin:0;" id="player-link-text"></p>
        </div>
        <div id="cloud-main" style="flex:1;min-width:0;">
          <div id="cloud-empty" class="empty-note">Zatím žádné odpovědi – jakmile někdo odešle slovo, objeví se tady.</div>
          <div id="cloud-wrap" style="display:flex;flex-wrap:wrap;gap:18px;justify-content:center;align-items:center;min-height:65vh;padding:24px;"></div>
        </div>
      </div>
    </div>
  </section>

</div>

<script src="js/config.js"></script>
<script src="js/wordcloud-data.js"></script>
<script>
  function $(id) { return document.getElementById(id); }

  const dateStr = getDateStr();
  const DEFAULT_QUESTION = "Co si představíte pod pojmem „umělá inteligence“?";
  let currentSessionId = getSessionId();
  let pollStop = null;

  function labelFromSessionId(id) {
    return id === dateStr ? "" : id.slice(dateStr.length + 1);
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function updatePlayerLinkAndQr() {
    const label = labelFromSessionId(currentSessionId);
    const search = label ? `?s=${encodeURIComponent(label)}` : "";
    const playerUrl = new URL("wordcloud.html" + search, window.location.href).toString();
    $("player-link-text").textContent = playerUrl;
    $("player-qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(playerUrl)}`;
  }

  async function refreshTabs() {
    const ids = await WC.listTodaySessions(dateStr);
    // aktuální session musí být vidět v seznamu i těsně po vytvoření
    if (!ids.includes(currentSessionId)) ids.push(currentSessionId);
    ids.sort();
    const questions = await Promise.all(ids.map((id) => WC.getQuestion(id)));
    $("session-tabs").innerHTML = ids
      .map((id, i) => {
        const label = labelFromSessionId(id) || "výchozí";
        const active = id === currentSessionId;
        const question = questions[i] || DEFAULT_QUESTION;
        return `<span style="display:inline-flex;align-items:stretch;border-radius:8px;overflow:hidden;">
          <button data-id="${escapeHtml(id)}" title="${escapeHtml(question)}" class="round-tab-btn${active ? " active" : ""}" style="border-radius:0;">${escapeHtml(label)}</button>
          <button data-delete-id="${escapeHtml(id)}" title="Smazat tuto session" style="all:unset;cursor:pointer;color:#a33;background:#fdeeee;font-weight:800;padding:0 12px;display:flex;align-items:center;">×</button>
        </span>`;
      })
      .join("");
    document.querySelectorAll("#session-tabs button[data-id]").forEach((btn) => {
      btn.addEventListener("click", () => switchToSession(btn.dataset.id));
    });
    document.querySelectorAll("#session-tabs button[data-delete-id]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = btn.dataset.deleteId;
        const label = labelFromSessionId(id) || "výchozí";
        if (!confirm(`Opravdu smazat session „${label}" a všechny její odpovědi? Tohle nejde vzít zpět.`)) return;
        await WC.deleteSession(id);
        if (id === currentSessionId) {
          await switchToSession(dateStr);
        } else {
          await refreshTabs();
        }
      });
    });
  }

  function fontSizeFor(count, minCount, maxCount) {
    const MIN_PX = 16;
    const MAX_PX = 58;
    if (maxCount === minCount) return (MIN_PX + MAX_PX) / 2;
    const ratio = Math.sqrt((count - minCount) / (maxCount - minCount));
    return Math.round(MIN_PX + (MAX_PX - MIN_PX) * ratio);
  }

  // Stabilní "náhodné" pořadí podle textu slova - stejné slovo vždy vyjde na stejné
  // pořadí, takže se mrak při každém obnovení (pollingu) nepřeskládává a "neposkakuje",
  // ale zároveň nejsou velká slova seřazená pěkně popořadě od nejčastějšího.
  function stableHash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = (h << 5) - h + str.charCodeAt(i);
      h |= 0;
    }
    return h;
  }

  const COLORS = ["#702082", "#ED8B00", "#9451a8", "#c97600", "#4a1657"];

  function startPolling() {
    if (pollStop) pollStop();
    pollStop = WC.watch(() => WC.getWordCounts(currentSessionId), (data, err) => {
      if (err || !data) return;
      renderCounts(data);
    }, POLL_INTERVAL_MS);
  }

  function renderCounts(counts) {
    if (!counts || counts.length === 0) {
      $("cloud-empty").style.display = "block";
      $("cloud-wrap").innerHTML = "";
      return;
    }
    $("cloud-empty").style.display = "none";
    const maxCount = counts[0].count;
    const minCount = counts[counts.length - 1].count;
    const scattered = [...counts].sort((a, b) => stableHash(a.word) - stableHash(b.word));
    // Barvy se střídají podle pořadí ve zpřeházeném poli (ne podle otisku slova) -
    // tím je zaručeno, že se barvy skutečně střídají a nemůže se náhodou sejít,
    // že vyjdou všechna slova stejnou barvou.
    $("cloud-wrap").innerHTML = scattered
      .map((c, i) => {
        const size = fontSizeFor(c.count, minCount, maxCount);
        const color = COLORS[i % COLORS.length];
        return `<span title="${c.count}×" style="font-weight:700;font-size:${size}px;color:${color};line-height:1;">${escapeHtml(c.word)}</span>`;
      })
      .join("");
  }

  async function switchToSession(id) {
    currentSessionId = id;
    $("current-session-label").textContent = labelFromSessionId(id) || "(výchozí, jen datum)";
    $("session-label-input").value = labelFromSessionId(id);
    history.replaceState(null, "", labelFromSessionId(id) ? `?s=${encodeURIComponent(labelFromSessionId(id))}` : window.location.pathname);
    updatePlayerLinkAndQr();
    await WC.touchSession(id);
    const question = await WC.getQuestion(id);
    $("current-session-question").textContent = question || DEFAULT_QUESTION;
    $("cloud-question-title").textContent = question || DEFAULT_QUESTION;
    $("session-question-input").value = question || "";
    await refreshTabs();
    startPolling();
  }

  // Prezentační režim: otevře panel s mrakem přes celé okno prohlížeče (bez adresního
  // řádku, záložek apod.) pomocí standardního Fullscreen API. Klávesa Escape ho zase
  // sama zavře - o to se stará přímo prohlížeč, nic navíc programovat netřeba.
  $("btn-present").addEventListener("click", () => {
    const el = $("cloud-panel");
    const request = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (!request) {
      alert("Tento prohlížeč bohužel režim celé obrazovky nepodporuje.");
      return;
    }
    Promise.resolve(request.call(el)).catch(() => {
      alert("Celou obrazovku se nepodařilo zapnout (může to blokovat nastavení prohlížeče). Zkuste prosím klávesu F11.");
    });
  });

  $("btn-session-create").addEventListener("click", async () => {
    const label = $("session-label-input").value.trim().toLowerCase().replace(/[^a-z0-9-]/g, "").slice(0, 30);
    const id = label ? `${dateStr}-${label}` : dateStr;
    const question = $("session-question-input").value.trim();
    if (question) await WC.setQuestion(id, question);
    await switchToSession(id);
  });
  $("session-label-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") $("btn-session-create").click();
  });
  $("session-question-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") $("btn-session-create").click();
  });

  async function init() {
    if (WC.isLocal()) {
      $("board-local-note").style.display = "block";
      $("board-local-note").textContent = WC.getLocalReason();
    }
    await switchToSession(currentSessionId);
  }

  init();
</script>
</body>
</html>
